<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortune Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0a0705;
    background-image: radial-gradient(ellipse at 50% 0%, #2a1f0e 0%, #0a0705 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    font-family: 'Cormorant Garamond', serif;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23c9a227' fill-opacity='0.03'%3E%3Cpath d='M20 20l20-20v40zM0 0l20 20L0 40z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .app-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: #c9a227;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-shadow: 0 0 40px rgba(201,162,39,0.4);
    position: relative;
    z-index: 1;
  }

  .app-subtitle {
    font-size: 13px;
    color: #7a6535;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 36px;
    position: relative;
    z-index: 1;
  }

  .wheel-stage {
    position: relative;
    width: 380px;
    height: 380px;
    margin-bottom: 32px;
    z-index: 1;
  }

  .wheel-outer-ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: conic-gradient(#c9a227, #f0d060, #c9a227, #8b6914, #c9a227, #f0d060, #c9a227);
    box-shadow: 0 0 60px rgba(201,162,39,0.25), inset 0 0 20px rgba(0,0,0,0.5);
  }

  .wheel-outer-ring::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background: #0a0705;
  }

  canvas#spinWheel {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    cursor: pointer;
  }

  .wheel-pointer {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 36px solid #c9a227;
    filter: drop-shadow(0 4px 10px rgba(201,162,39,0.7));
    z-index: 10;
  }

  .wheel-pointer::after {
    content: '';
    position: absolute;
    top: -40px;
    left: -7px;
    width: 14px;
    height: 14px;
    background: #f0d060;
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(240,208,96,0.9);
  }

  .wheel-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f0d060, #c9a227, #8b6914);
    box-shadow: 0 0 24px rgba(201,162,39,0.7), inset 0 2px 4px rgba(255,255,255,0.3);
    z-index: 10;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .wheel-center:hover { transform: translate(-50%, -50%) scale(1.08); }

  .spin-btn {
    background: linear-gradient(135deg, #c9a227, #f0d060, #c9a227);
    color: #0a0705;
    border: none;
    padding: 16px 56px;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    border-radius: 2px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 24px rgba(201,162,39,0.4);
    margin-bottom: 36px;
    position: relative;
    z-index: 1;
  }

  .spin-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 10px 36px rgba(201,162,39,0.55);
  }

  .spin-btn:active:not(:disabled) { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .section-label {
    font-size: 11px;
    color: #7a6535;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 1;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 1;
  }

  .option-input-wrap {
    display: flex;
    align-items: center;
    background: rgba(201,162,39,0.06);
    border: 0.5px solid rgba(201,162,39,0.22);
    border-radius: 2px;
    padding: 0 12px;
    gap: 8px;
    transition: border-color 0.2s;
  }

  .option-input-wrap:focus-within {
    border-color: rgba(201,162,39,0.55);
    background: rgba(201,162,39,0.09);
  }

  .option-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .option-input {
    background: transparent;
    border: none;
    color: #d4b84a;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    padding: 12px 0;
    width: 100%;
    outline: none;
  }

  .option-input::placeholder { color: #3a2c10; }

  .save-note {
    font-size: 12px;
    color: #4a3a1a;
    letter-spacing: 1px;
    margin-top: 14px;
    position: relative;
    z-index: 1;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .modal-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .modal-box {
    background: #0f0c06;
    border: 1px solid #c9a227;
    border-radius: 4px;
    padding: 48px 56px;
    text-align: center;
    position: relative;
    max-width: 380px;
    width: 90%;
    transform: scale(0.8);
    transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 0 80px rgba(201,162,39,0.25), inset 0 0 40px rgba(201,162,39,0.03);
  }

  .modal-box::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 0.5px solid rgba(201,162,39,0.18);
    border-radius: 3px;
    pointer-events: none;
  }

  .modal-overlay.visible .modal-box { transform: scale(1); }

  .modal-ornament {
    font-size: 24px;
    color: #c9a227;
    letter-spacing: 8px;
    margin-bottom: 16px;
  }

  .modal-label {
    font-size: 11px;
    color: #7a6535;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .modal-winner {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    color: #f0d060;
    font-weight: 700;
    text-shadow: 0 0 40px rgba(240,208,96,0.45);
    margin-bottom: 30px;
    line-height: 1.2;
    word-break: break-word;
  }

  .modal-close {
    background: transparent;
    border: 1px solid #c9a227;
    color: #c9a227;
    padding: 12px 32px;
    font-family: 'Playfair Display', serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, color 0.2s;
  }

  .modal-close:hover { background: #c9a227; color: #0a0705; }

  /* Confetti */
  #confettiCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>

<div class="app-title">Fortune Wheel</div>
<div class="app-subtitle">Spin to reveal your fate</div>

<div class="wheel-stage">
  <div class="wheel-outer-ring"></div>
  <canvas id="spinWheel" width="380" height="380"></canvas>
  <div class="wheel-pointer"></div>
  <div class="wheel-center" id="centerBtn"></div>
</div>

<button class="spin-btn" id="spinBtn">Spin</button>

<div class="section-label">Edit your options</div>
<div class="options-grid" id="optionsGrid"></div>
<div class="save-note">✦ Your options are automatically saved in this browser</div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-ornament">✦ ✦ ✦</div>
    <div class="modal-label">The wheel has chosen</div>
    <div class="modal-winner" id="modalWinner">Option</div>
    <button class="modal-close" onclick="closeModal()">Spin Again</button>
  </div>
</div>

<canvas id="confettiCanvas"></canvas>

<script>
const STORAGE_KEY = 'fortune_wheel_options';

const COLORS = [
  ['#1a1000','#c9a227'],
  ['#0d1a0a','#7ab648'],
  ['#1a0a00','#e07832'],
  ['#0a0d1a','#4a7ac9'],
  ['#1a001a','#b84ab8'],
  ['#001a14','#2abf96'],
];

const GOLD_PALETTE = ['#c9a227','#f0d060','#8b6914','#dab840','#e8c94a','#a07820'];

const DEFAULT_OPTIONS = ['Option 1','Option 2','Option 3','Option 4','Option 5','Option 6'];

// Load saved options or use defaults
function loadOptions() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length === 6) return parsed;
    }
  } catch(e) {}
  return [...DEFAULT_OPTIONS];
}

function saveOptions() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(options)); } catch(e) {}
}

let options = loadOptions();
let spinning = false;
let currentAngle = 0;
let animFrame;

const canvas = document.getElementById('spinWheel');
const ctx = canvas.getContext('2d');
const spinBtn = document.getElementById('spinBtn');
const modal = document.getElementById('modal');
const modalWinner = document.getElementById('modalWinner');

function drawWheel() {
  const W = canvas.width, cx = W/2, cy = W/2, r = W/2 - 4;
  ctx.clearRect(0,0,W,W);
  const n = options.length;
  const slice = (2*Math.PI)/n;

  for(let i=0;i<n;i++){
    const start = currentAngle + i*slice;
    const end = start + slice;
    const [bg, fg] = COLORS[i % COLORS.length];

    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,end);
    ctx.closePath();
    ctx.fillStyle = bg;
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(cx,cy);
    const ex = cx + r*Math.cos(start);
    const ey = cy + r*Math.sin(start);
    ctx.lineTo(ex,ey);
    ctx.strokeStyle = GOLD_PALETTE[i % GOLD_PALETTE.length];
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(start + slice/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = fg;
    ctx.font = "500 15px 'Cormorant Garamond', serif";
    const txt = options[i] || '';
    const display = txt.length > 14 ? txt.slice(0,13)+'…' : txt;
    ctx.fillText(display, r - 18, 5);
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(cx,cy,25,0,2*Math.PI);
  ctx.fillStyle = '#0a0705';
  ctx.fill();
  ctx.strokeStyle = '#c9a227';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function buildInputs(){
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  options.forEach((opt,i)=>{
    const wrap = document.createElement('div');
    wrap.className = 'option-input-wrap';
    const dot = document.createElement('div');
    dot.className = 'option-dot';
    dot.style.background = COLORS[i % COLORS.length][1];
    const inp = document.createElement('input');
    inp.className = 'option-input';
    inp.value = opt;
    inp.placeholder = 'Option '+(i+1);
    inp.maxLength = 18;
    inp.addEventListener('input', e => {
      options[i] = e.target.value;
      saveOptions();
      drawWheel();
    });
    wrap.appendChild(dot);
    wrap.appendChild(inp);
    grid.appendChild(wrap);
  });
}

// Audio
let audioCtx;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playTick(){
  try{
    const a = getAudio();
    const o = a.createOscillator();
    const g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.frequency.value = 880 + Math.random()*400;
    g.gain.setValueAtTime(0.12,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.05);
    o.start(); o.stop(a.currentTime+0.05);
  }catch(e){}
}

function playVictory(){
  try{
    const a = getAudio();
    const notes = [523,659,784,1047];
    notes.forEach((freq,i)=>{
      const o = a.createOscillator();
      const g = a.createGain();
      o.connect(g); g.connect(a.destination);
      o.type = 'triangle';
      o.frequency.value = freq;
      const t = a.currentTime + i*0.15;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.2,t+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      o.start(t); o.stop(t+0.45);
    });
  }catch(e){}
}

// Confetti
let confParticles = [];
const confCanvas = document.getElementById('confettiCanvas');
const confCtx = confCanvas.getContext('2d');
let confAnim;

function launchConfetti(){
  confCanvas.width = window.innerWidth;
  confCanvas.height = window.innerHeight;
  confParticles = [];
  for(let i=0;i<180;i++){
    confParticles.push({
      x: Math.random()*confCanvas.width,
      y: -10 - Math.random()*200,
      vx: (Math.random()-0.5)*5,
      vy: 3 + Math.random()*5,
      r: 4+Math.random()*7,
      color: GOLD_PALETTE[Math.floor(Math.random()*GOLD_PALETTE.length)],
      rot: Math.random()*360,
      rotV: (Math.random()-0.5)*10,
      shape: Math.random()>0.5?'rect':'circle'
    });
  }
  animateConfetti();
}

function animateConfetti(){
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  confParticles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.rot+=p.rotV;
    confCtx.save();
    confCtx.translate(p.x,p.y);
    confCtx.rotate(p.rot*Math.PI/180);
    confCtx.fillStyle = p.color;
    confCtx.globalAlpha = Math.max(0,(confCanvas.height-p.y)/confCanvas.height);
    if(p.shape==='rect'){
      confCtx.fillRect(-p.r/2,-p.r/4,p.r,p.r/2);
    } else {
      confCtx.beginPath();
      confCtx.arc(0,0,p.r/2,0,2*Math.PI);
      confCtx.fill();
    }
    confCtx.restore();
  });
  confParticles = confParticles.filter(p=>p.y<confCanvas.height+20);
  if(confParticles.length>0) confAnim = requestAnimationFrame(animateConfetti);
  else confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
}

// Spin
function spin(){
  if(spinning) return;
  spinning = true;
  spinBtn.disabled = true;

  const totalDuration = 10000;
  const extraSpins = 8 + Math.random()*4;
  const targetAngle = currentAngle + extraSpins*2*Math.PI + Math.random()*2*Math.PI;
  const start = performance.now();
  const startAngle = currentAngle;
  let lastTickAngle = currentAngle;
  const n = options.length;
  const sliceAngle = (2*Math.PI)/n;

  function easeOut(t){ return 1 - Math.pow(1-t, 4); }

  function step(now){
    const elapsed = now - start;
    const progress = Math.min(elapsed/totalDuration, 1);
    currentAngle = startAngle + (targetAngle - startAngle)*easeOut(progress);

    if(Math.abs(currentAngle - lastTickAngle) >= sliceAngle*0.6){
      playTick();
      lastTickAngle = currentAngle;
    }

    drawWheel();

    if(progress < 1){
      animFrame = requestAnimationFrame(step);
    } else {
      currentAngle = targetAngle % (2*Math.PI);
      drawWheel();
      spinning = false;
      spinBtn.disabled = false;

      const pointerAngle = (3*Math.PI/2);
      let rel = ((pointerAngle - currentAngle) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
      const winIdx = Math.floor(rel / sliceAngle) % n;
      const winner = options[winIdx] || 'Unknown';

      setTimeout(()=>{
        playVictory();
        launchConfetti();
        showModal(winner);
      }, 300);
    }
  }
  requestAnimationFrame(step);
}

function showModal(winner){
  modalWinner.textContent = winner || '✦';
  modal.classList.add('visible');
}

function closeModal(){
  modal.classList.remove('visible');
  cancelAnimationFrame(confAnim);
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
}

spinBtn.addEventListener('click', spin);
document.getElementById('centerBtn').addEventListener('click', spin);

buildInputs();
drawWheel();
</script>
</body>
</html>
